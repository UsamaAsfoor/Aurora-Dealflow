app = "aurora-dealflow-web"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.web"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://aurora-dealflow-api.fly.dev"

[env]
  PORT = "8080"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/"
