services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aurora-postgres
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora
      POSTGRES_DB: aurora_dealflow
    ports:
      - "5434:5432"
    volumes:
      - aurora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora -d aurora_dealflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aurora_pg_data:
