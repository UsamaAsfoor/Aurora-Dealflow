name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: aurora
          POSTGRES_DB: aurora_dealflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aurora -d aurora_dealflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aurora:aurora@localhost:5432/aurora_dealflow
      JWT_SECRET: aurora-dealflow-ci-secret-minimum-32-characters-long

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
