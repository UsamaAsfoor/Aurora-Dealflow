app = "aurora-dealflow-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "8080"
  ATTOM_USE_DEMO = "true"
  OPENAI_USE_DEMO = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[deploy]
  release_command = "node packages/db/dist/migrate.js"
